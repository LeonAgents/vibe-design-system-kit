name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint + theme token scan
        run: npm run lint

      - name: Verify design-tokens.css is in sync
        run: |
          npm run tokens:build
          git diff --exit-code design-tokens.css

      - name: Build
        run: npm run build
